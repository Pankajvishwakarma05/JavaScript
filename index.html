<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I am learning JavaScript</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 50px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 42px;
      color: #ffffff;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #e0e0e0;
    }

    .highlight {
      color: #ffd369;
      font-weight: bold;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: #ffd369;
      color: #333;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ffb703;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
<div class="container">
  <h1>🚀 I am learning <span class="highlight">JavaScript</span></h1>
  <p>Building skills step by step towards becoming a developer 💻</p>

  <button class="btn">Start Coding</button>
</div>

<script src="#"></script>
</body>
</html>
